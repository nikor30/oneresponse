# Manually dispatched release workflow: tags the current commit on the chosen
# branch and publishes a GitHub Release. Release notes are taken from the
# newest section of CHANGELOG.md unless custom notes are provided.
name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to create (e.g. v1.1.0)'
        required: true
      title:
        description: 'Release title (defaults to "oneresponse <tag>")'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract latest changelog section
        run: |
          if [ -f CHANGELOG.md ]; then
            awk '/^## /{n++} n==1' CHANGELOG.md > /tmp/notes.md
          fi
          if [ ! -s /tmp/notes.md ]; then
            echo "Release ${{ inputs.tag }}" > /tmp/notes.md
          fi

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE="${{ inputs.title }}"
          if [ -z "$TITLE" ]; then
            TITLE="oneresponse ${{ inputs.tag }}"
          fi
          gh release create "${{ inputs.tag }}" \
            --target "$GITHUB_SHA" \
            --title "$TITLE" \
            --notes-file /tmp/notes.md
