# Release-on-version-bump: every push to main reads package.json; if that
# version has no GitHub Release yet, the commit is tagged v<version> and a
# release is published with notes from the newest CHANGELOG.md section.
# Idempotent — pushes that don't change the version do nothing.
name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check if already released
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ steps.ver.outputs.version }}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract latest changelog section
        if: steps.check.outputs.exists == 'false'
        run: |
          if [ -f CHANGELOG.md ]; then
            awk '/^## /{n++} n==1' CHANGELOG.md > /tmp/notes.md
          fi
          if [ ! -s /tmp/notes.md ]; then
            echo "Release v${{ steps.ver.outputs.version }}" > /tmp/notes.md
          fi

      - name: Create tag and release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.ver.outputs.version }}" \
            --target "$GITHUB_SHA" \
            --title "oneresponse v${{ steps.ver.outputs.version }}" \
            --notes-file /tmp/notes.md
